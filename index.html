<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing-Launchpad</title>

    <!-- Font1 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font2 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <header class="font1">
      <nav>
        <h1 class="logo">Logo</h1>
        <button class="nav-btn">Sign Up</button>
      </nav>

      <div class="banner">
        <h1 class="banner-title">
          Cool Dark UI Template for
          <br />
          Webflow Agencies!
        </h1>
        <div class="stay-btn">
          <button class="stay">Stay Focused</button>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="action">
        <div>
          <h2 class="action-title">See It in Action</h2>
          <p class="action-description">
            Explore the live preview and imagine your brand in this bold new
            look.
          </p>
          <button class="action-btn">Launch Live Preview</button>
        </div>
        <div>
            <img class="action-img" src="./Assets/wc-mini.png" alt="">
        </div>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
